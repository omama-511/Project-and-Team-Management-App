<h2 mat-dialog-title>Add Project Member</h2>
<mat-dialog-content>
  <form [formGroup]="memberForm" class="assign-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Select User</mat-label>
      <mat-select formControlName="user_id">
        <mat-option *ngFor="let user of users" [value]="user.id">
          {{ user.name }} ({{ user.email }})
        </mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Role in Project</mat-label>
      <input matInput formControlName="role_in_project" placeholder="e.g. Lead Developer, QA, etc.">
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" [disabled]="memberForm.invalid" (click)="onSubmit()">Add Member</button>
</mat-dialog-actions>
